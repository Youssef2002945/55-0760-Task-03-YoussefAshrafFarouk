services:
  postgres:
    image: postgres:17
    container_name: task03-postgres
    environment:
      POSTGRES_DB: task03db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: 55-0760_container
    ports:
      - "0760:8080"
    environment:
      USER_NAME: Compose_Youssef_Ashraf_Farouk
      ID: Compose_55_0760
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/task03db
      JWT_SECRET: dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIEpXVCBzaWduaW5n
      JWT_EXPIRATION: 3600000
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata: